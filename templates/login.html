<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeDocs Module B Login</title>
    <style>
        :root {
            --bg-1: #f8f5ef;
            --bg-2: #f4ebdd;
            --ink: #1d1c1a;
            --accent: #b7472a;
            --card: #fffdf8;
            --line: #e7d4bb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", "Trebuchet MS", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1000px 600px at 10% -20%, #ffd8a6 0%, transparent 60%),
                radial-gradient(900px 700px at 110% 120%, #ffcfbf 0%, transparent 60%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2));
            display: grid;
            place-items: center;
            padding: 1rem;
        }

        .card {
            width: min(420px, 100%);
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 12px 28px rgba(86, 56, 31, 0.15);
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
        }

        p {
            margin: 0.45rem 0 1rem;
            color: #5f5040;
        }

        form {
            display: grid;
            gap: 0.8rem;
        }

        label {
            display: grid;
            gap: 0.3rem;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            border: 1px solid #d5c2a9;
            border-radius: 10px;
            padding: 0.7rem 0.8rem;
            background: #fff;
            color: var(--ink);
        }

        button {
            margin-top: 0.3rem;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 0.9rem;
            background: var(--accent);
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }

        .hint {
            margin-top: 0.8rem;
            font-size: 0.85rem;
            color: #6b5c4c;
            border-top: 1px dashed var(--line);
            padding-top: 0.7rem;
        }
    </style>
</head>
<body>
    <section class="card">
        <h1>SafeDocs</h1>
        <p>Login to access the RBAC UI, portfolio, and secure APIs.</p>

        <form method="post" action="/login">
            <label>
                Username
                <input name="user" type="text" placeholder="Enter username" required>
            </label>
            <label>
                Password
                <input name="password" type="password" placeholder="Enter password" required>
            </label>
            <button type="submit">Sign In</button>
        </form>

        <div class="hint">
            Default bootstrap admin is controlled by environment variables.
        </div>
    </section>
</body>
</html>
